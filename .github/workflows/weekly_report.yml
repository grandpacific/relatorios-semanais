name: GrandPacific — Relatório Semanal

on:
  # Toda segunda-feira às 6h (horário de Brasília = 9h UTC)
  schedule:
    - cron: "0 9 * * 1"

  # Permite rodar manualmente pelo painel do GitHub
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (gera mas não publica)"
        required: false
        default: "false"

jobs:
  gerar-relatorio:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install anthropic requests python-dotenv

      - name: Gerar e publicar relatório
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET:    ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN:  ${{ secrets.SANITY_API_TOKEN }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          OPEN_WEATHER_KEY:  ${{ secrets.OPEN_WEATHER_KEY }}
          DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python scripts/generate_report.py

      - name: Upload backup do relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-relatorio-${{ github.run_id }}
          path: /tmp/report_semana_*.json
          retention-days: 90

      - name: Notificar falha por e-mail
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[ALERTA] Falha na geração do relatório GrandPacific"
          to: ${{ secrets.MAIL_NOTIFY }}
          from: GrandPacific Automação
          body: |
            O pipeline de geração do relatório semanal falhou.
            Verifique os logs em: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
